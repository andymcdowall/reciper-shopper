<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Shopper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Recipe Shopper</h1>
      <nav>
        <button id="nav-recipes" class="nav-btn active">Recipes</button>
        <button id="nav-add-recipe" class="nav-btn">Add Recipe</button>
        <button id="nav-ingredients" class="nav-btn">Ingredients</button>
        <button id="nav-units" class="nav-btn">Units</button>
        <button id="nav-cart" class="nav-btn">Cart <span id="cart-count" class="badge">0</span></button>
        <button id="nav-shopping-list" class="nav-btn">Shopping List</button>
        <button id="nav-export-import" class="nav-btn">Export/Import</button>
      </nav>
    </header>

    <main>
      <!-- Recipes View -->
      <section id="recipes-view" class="view active">
        <h2>My Recipes</h2>
        <div id="recipes-list" class="recipes-grid"></div>
      </section>

      <!-- Add Recipe View -->
      <section id="add-recipe-view" class="view">
        <h2>Add Recipe</h2>
        <form id="recipe-form">
          <div class="form-group">
            <label for="recipe-name">Recipe Name *</label>
            <input type="text" id="recipe-name" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="recipe-servings">Servings</label>
              <input type="number" id="recipe-servings" min="1">
            </div>
            <div class="form-group">
              <label for="recipe-prep-time">Prep Time (minutes)</label>
              <input type="number" id="recipe-prep-time" min="0">
            </div>
          </div>

          <div class="form-group">
            <label>Ingredients *</label>
            <div id="ingredients-list">
              <div class="ingredient-row">
                <div class="ingredient-name-container">
                  <input type="text" class="ingredient-name" placeholder="Ingredient name" required autocomplete="off">
                </div>
                <input type="hidden" class="ingredient-id">
                <input type="number" class="ingredient-quantity" placeholder="Qty" step="0.01" required>
                <div class="unit-container">
                  <input type="text" class="unit-name" placeholder="Unit" required autocomplete="off">
                </div>
                <input type="hidden" class="unit-id">
                <button type="button" class="btn-remove" onclick="removeIngredient(this)">Remove</button>
              </div>
            </div>
            <button type="button" id="add-ingredient-btn" class="btn-secondary">+ Add Ingredient</button>
          </div>

          <div class="form-group">
            <label for="recipe-instructions">Instructions</label>
            <textarea id="recipe-instructions" rows="6"></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">Save Recipe</button>
            <button type="button" id="cancel-recipe-btn" class="btn-secondary">Cancel</button>
          </div>
        </form>
      </section>

      <!-- Ingredients View -->
      <section id="ingredients-view" class="view">
        <h2>Ingredients</h2>

        <div class="ingredient-add-section">
          <form id="ingredient-form" class="ingredient-add-form">
            <input type="text" id="new-ingredient-name" placeholder="Add new ingredient..." required>
            <button type="submit" class="btn-primary">Add</button>
          </form>
        </div>

        <div id="ingredients-grid" class="ingredients-grid"></div>
      </section>

      <!-- Units View -->
      <section id="units-view" class="view">
        <h2>Units</h2>

        <div class="unit-add-section">
          <form id="unit-form" class="unit-add-form">
            <input type="text" id="new-unit-name" placeholder="Unit name..." required>
            <select id="new-unit-category" required>
              <option value="">Select category...</option>
              <option value="volume">Volume</option>
              <option value="mass">Mass</option>
              <option value="length">Length</option>
              <option value="count">Count</option>
            </select>
            <select id="new-unit-base">
              <option value="">Base unit (optional)</option>
            </select>
            <input type="number" id="new-unit-factor" placeholder="Conversion factor" step="0.000001">
            <input type="number" id="new-unit-rounding" placeholder="Rounding (e.g. 0.25, 1)" step="0.000001" min="0">
            <button type="submit" class="btn-primary">Add Unit</button>
          </form>
        </div>

        <div id="units-grid" class="units-grid"></div>
      </section>

      <!-- Cart View -->
      <section id="cart-view" class="view">
        <h2>Shopping Cart</h2>
        <div id="cart-list" class="recipes-grid"></div>
      </section>

      <!-- Shopping List View -->
      <section id="shopping-list-view" class="view">
        <h2>Shopping List</h2>
        <div id="shopping-list-items"></div>
      </section>

      <!-- Export/Import View -->
      <section id="export-import-view" class="view">
        <h2>Export/Import Recipes</h2>

        <div class="export-section">
          <h3>Export Recipes</h3>
          <p>Download all your recipes as a JSON file for backup or sharing.</p>
          <button id="export-btn" class="btn-primary">Export Recipes</button>
        </div>

        <hr>

        <div class="import-section">
          <h3>Import Recipes</h3>
          <p>Upload a JSON file to import recipes.</p>

          <div class="form-group">
            <label for="import-file">Select File</label>
            <input type="file" id="import-file" accept=".json">
          </div>

          <div class="form-group">
            <label>Import Mode</label>
            <div class="radio-group">
              <label>
                <input type="radio" name="import-mode" value="add" checked>
                Add to existing recipes (skip duplicates)
              </label>
              <label>
                <input type="radio" name="import-mode" value="overwrite">
                Overwrite all recipes (delete existing recipes)
              </label>
            </div>
          </div>

          <button id="import-btn" class="btn-primary" disabled>Import Recipes</button>

          <div id="import-result" class="import-result"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- Add Unit Modal -->
  <div id="add-unit-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add New Unit</h3>
        <button class="modal-close" onclick="closeAddUnitModal()">&times;</button>
      </div>
      <form id="add-unit-modal-form">
        <div class="form-group">
          <label for="modal-unit-name">Unit Name *</label>
          <input type="text" id="modal-unit-name" required>
        </div>
        <div class="form-group">
          <label for="modal-unit-category">Category *</label>
          <select id="modal-unit-category" required>
            <option value="">Select category...</option>
            <option value="volume">Volume</option>
            <option value="mass">Mass</option>
            <option value="length">Length</option>
            <option value="count">Count</option>
          </select>
        </div>
        <div class="form-group">
          <label for="modal-unit-base">Base Unit (optional)</label>
          <select id="modal-unit-base">
            <option value="">None (this is a base unit)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="modal-unit-factor">Conversion Factor</label>
          <input type="number" id="modal-unit-factor" step="0.000001" placeholder="How many base units equal 1 of this unit">
        </div>
        <div class="form-group">
          <label for="modal-unit-rounding">Rounding Increment (optional)</label>
          <input type="number" id="modal-unit-rounding" step="0.000001" min="0" placeholder="e.g. 0.25 for quarters, 1 for whole numbers">
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn-primary">Add Unit</button>
          <button type="button" class="btn-secondary" onclick="closeAddUnitModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
