<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Shopper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Recipe Shopper</h1>
      <nav>
        <button id="nav-recipes" class="nav-btn active">Recipes</button>
        <button id="nav-add-recipe" class="nav-btn">Add Recipe</button>
        <button id="nav-cart" class="nav-btn">Cart <span id="cart-count" class="badge">0</span></button>
        <button id="nav-shopping-list" class="nav-btn">Shopping List</button>
      </nav>
    </header>

    <main>
      <!-- Recipes View -->
      <section id="recipes-view" class="view active">
        <h2>My Recipes</h2>
        <div id="recipes-list" class="recipes-grid"></div>
      </section>

      <!-- Add Recipe View -->
      <section id="add-recipe-view" class="view">
        <h2>Add Recipe</h2>
        <form id="recipe-form">
          <div class="form-group">
            <label for="recipe-name">Recipe Name *</label>
            <input type="text" id="recipe-name" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="recipe-servings">Servings</label>
              <input type="number" id="recipe-servings" min="1">
            </div>
            <div class="form-group">
              <label for="recipe-prep-time">Prep Time (minutes)</label>
              <input type="number" id="recipe-prep-time" min="0">
            </div>
          </div>

          <div class="form-group">
            <label>Ingredients *</label>
            <div id="ingredients-list">
              <div class="ingredient-row">
                <input type="text" class="ingredient-name" placeholder="Ingredient name" required>
                <input type="number" class="ingredient-quantity" placeholder="Qty" step="0.01" required>
                <input type="text" class="ingredient-unit" placeholder="Unit" required>
                <button type="button" class="btn-remove" onclick="removeIngredient(this)">Remove</button>
              </div>
            </div>
            <button type="button" id="add-ingredient-btn" class="btn-secondary">+ Add Ingredient</button>
          </div>

          <div class="form-group">
            <label for="recipe-instructions">Instructions</label>
            <textarea id="recipe-instructions" rows="6"></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">Save Recipe</button>
            <button type="button" id="cancel-recipe-btn" class="btn-secondary">Cancel</button>
          </div>
        </form>
      </section>

      <!-- Cart View -->
      <section id="cart-view" class="view">
        <h2>Shopping Cart</h2>
        <div id="cart-list" class="recipes-grid"></div>
      </section>

      <!-- Shopping List View -->
      <section id="shopping-list-view" class="view">
        <h2>Shopping List</h2>
        <div id="shopping-list-items"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
